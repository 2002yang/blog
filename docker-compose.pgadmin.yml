# 可选：添加 pgAdmin Web 界面来管理数据库
# 使用方法：docker compose -f docker-compose.yml -f docker-compose.pgadmin.yml up -d

services:
  pgadmin:
    image: dpage/pgadmin4:8.5
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  pgadmin-data:
